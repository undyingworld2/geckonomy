name: Geckonomy
description: ${project.description}
prefix: Geckonomy
version: '${project.version}'

main: com.the1mason.geckonomy.Geckonomy
loader: com.the1mason.geckonomy.GeckonomyLoader
api-version: '26.1.2'
load: STARTUP

authors: [ the1mason ]
website: the1mason.com

# "Vault" is VaultUnlocked's plugin name - it is a drop-in replacement and keeps the original's name.
# The name does not distinguish the two, so onEnable checks for the v2 API itself before registering.
# required: false - Geckonomy runs fine without it; only third-party integration is lost, and enable
# says so. load: BEFORE - the ServicesManager registration in onEnable needs its classes present.
dependencies:
  server:
    Vault:
      load: BEFORE
      required: false
      join-classpath: true

# Base nodes only. The per-currency nodes (geckonomy.pay.coins, ...) are named after config, so they
# are registered at enable and on reload by GeckonomyPermissions - see that class for why an
# unregistered node would deny every non-op.
permissions:
  geckonomy.balance:
    description: Check your own balance
    default: true
  geckonomy.balance.others:
    description: Check another player's balance
    default: true
  geckonomy.pay:
    description: Pay another player
    default: true
  geckonomy.baltop:
    description: List the richest accounts
    default: true
  geckonomy.admin:
    description: Administer balances, reload the configuration
    default: op
