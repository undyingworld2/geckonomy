# ── Storage ─────────────────────────────────────────────────────────────
storage:
  type: sqlite            # sqlite | mariadb
  # SQLite (local):
  file: "plugins/Geckonomy/data.db"
  # MariaDB (remote):
  host: "127.0.0.1"
  port: 3306
  database: "geckonomy"
  username: "geckonomy"
  password: "change-me"
  properties:             # optional extra JDBC properties
    useSSL: "false"
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout-ms: 10000

# ── Currencies ──────────────────────────────────────────────────────────
# Exactly one must have default: true.
# singular/plural/symbol/format accept MiniMessage (e.g. <gradient>, <#ff8800>) and render as
# self-contained components, so styling here never bleeds into the rest of a message (LOCALIZATION.md
# §4). singular/plural are also overridable per language via currencies.<code> in a lang file
# (LOCALIZATION.md §2).
currencies:
  - code: "coins"         # machine id, lowercase [a-z0-9_-]
    singular: "Coin"
    plural: "Coins"
    symbol: "$"
    fractional-digits: 2  # 0..4
    starting-balance: 100.00
    default: true
    scope: network        # network (shared across servers) | server (per this server)
    transferable: true    # may players /pay this currency?
    balance-check-others: true   # may players check others' balance in this currency?
    show-in-baltop: true  # appears in /baltop?
    format: "<symbol><amount>"     # display template (see LOCALIZATION.md)
  - code: "gems"
    singular: "Gem"
    plural: "Gems"
    symbol: "◆"
    fractional-digits: 0
    starting-balance: 0
    default: false
    scope: server         # per-server currency: balance is local to this server instance
    transferable: false   # cannot be paid between players
    balance-check-others: false
    show-in-baltop: true
    format: "<amount> <currency>"

# ── Settings ────────────────────────────────────────────────────────────
settings:
  server-id: "survival"   # identifies THIS server instance; scope key for per-server currencies.
                          # Must be unique per server sharing a database. Changing it orphans
                          # this server's per-server balances (they get a new scope key).
  language: "en"          # language file under lang/, falls back to en
  allow-overdraft: false  # if true, balances may go negative
  rounding-mode: HALF_UP  # any java.math.RoundingMode
  keep-transaction-history: true
  baltop-size: 10
  claim-vault-economy: true   # Geckonomy is the ONLY economy. When true it unregisters any other
                              # Vault economy provider so shops and similar plugins can never bind to
                              # the wrong one - including EssentialsX, whose economy does not stand
                              # down on its own and has no setting to make it. Set false only if you
                              # deliberately run another economy plugin alongside Geckonomy.

# ── Placeholders ────────────────────────────────────────────────────────
# The PlaceholderAPI expansion (%geckonomy_...%). Only used when PlaceholderAPI
# is installed; without it Geckonomy runs normally and says so at startup.
placeholders:
  baltop-refresh-seconds: 60   # how often the leaderboard snapshot is rebuilt. Placeholders never
                               # query the database, so the leaderboard is at most this far behind.
                               # Minimum 5.
  offline-cache-seconds: 60    # an offline player's balance is read once and reused for this long.
                               # Online players always read live from memory, so this affects only
                               # players who have logged out.
  fallback: "0"                # shown while a value is not known yet: the first render for an
                               # offline player (the real balance appears a tick later), or a rank
                               # nobody holds.
                               #
                               # NOTE: %geckonomy_baltop_rank% is answered from the leaderboard
                               # snapshot, so it is bounded by baltop-size above - a player outside
                               # the top N has no rank and shows this instead. A true rank would
                               # need a database count for every player every tick, which is exactly
                               # what these placeholders are built not to do.

# ── Cross-server sync (RESERVED — not active in v1) ──────────────────────
# Live propagation of `network` currencies between servers. Until this ships, a
# network currency on a shared MariaDB is refreshed just after it is read, so a
# balance another server changed shows up on the next read rather than at once.
# redis:
#   enabled: false
#   host: "127.0.0.1"
#   port: 6379
#   password: ""
